baseURL = "https://freebook-review.com/"
languageCode = "en-us"
locale = "en"
title = "Free Book Review"
theme = "adritian-free-hugo-theme"
enableRobotsTXT = true
buildFuture = true

[pagination]
pagerSize = 10

[taxonomies]
tag = "tags"
category = "categories"
author = "authors"
series = "series"
topic = "topics"

[outputs]
page = ["HTML"]
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    lineNos = false
    noClasses = false
    style = "github"

[imaging]
resampleFilter = "Lanczos"
quality = 85
anchor = "Smart"

[minify]
minifyOutput = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.156.0"

  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "node_modules/bootstrap/scss"
    target = "assets/scss/bootstrap"
  [[module.mounts]]
    source = "node_modules/bootstrap/dist/js"
    target = "assets/js/bootstrap"
  [[module.mounts]]
    source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
    target = "assets/js/vendor/bootstrap.bundle.min.js"
  [[module.mounts]]
    source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
    target = "assets/css/bootstrap-print.css"
  [[module.mounts]]
    source = "node_modules/fuse.js/dist/fuse.min.js"
    target = "static/js/fuse.min.js"
  [[module.mounts]]
    source = "node_modules/dompurify/dist/purify.min.js"
    target = "static/js/purify.min.js"

[params]
title = "Free Book Review"
description = "Practical notes for authors on Amazon reviews, book launches, and ethical social proof."
images = ["/favicon.png"]
themeColor = "#256f6c"
colorScheme = "default"
sections = []
viewTransitions = true

[params.seo]
siteName = "Free Book Review"
siteDescription = "Practical notes for authors on Amazon reviews, book launches, and ethical social proof."
siteImage = "/favicon.png"

[params.seo.person]
name = "Free Book Review"
url = "https://freebook-review.com"
sameAs = []

[params.blog]
layout = "default"
listLayout = "summary"
listStyle = "summary"
narrowContent = true
sidebarWidth = 30
showCategories = true
showRecentPosts = true
recentPostCount = 5
readingProgress = true
featured_sort_by_weight = false

[params.colorTheme]
  [params.colorTheme.auto]
    disable = false
  [params.colorTheme.forced]
    theme = "light"
  [params.colorTheme.selector.disable]
    header = true
    footer = true

[params.colorSchemeSwitcher]
enable = false
  [params.colorSchemeSwitcher.selector.disable]
    header = true
    footer = true

[params.languages.selector.disable]
header = true
footer = true
mobileHeader = true

[params.analytics]
vercelPageInsights = false
vercelAnalytics = false
  [params.analytics.googleAnalytics]
    code = ""
    enabled = false
  [params.analytics.googleTagManager]
    code = ""
    enabled = false

[build]
writeStats = true
  [build.buildStats]
    enabledFor = ["scss"]
    disableClasses = false
    disableIDs = false
    disableTags = false
    enable = true

[[menus.header]]
name = "Home"
url = "/"
weight = 1

[[menus.header]]
name = "Blog"
url = "/blog/"
weight = 2

[[menus.header]]
name = "Tags"
url = "/tags/"
weight = 3

[[menus.footer]]
name = "Home"
url = "/"
weight = 1

[[menus.footer]]
name = "Blog"
url = "/blog/"
weight = 2

[[menus.footer]]
name = "Categories"
url = "/categories/"
weight = 3
